<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#f8fafc">
    <title>Solo Cristo Salva | Iglesia Bautista de Sola</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #f0f4f8;
            --bg-surface: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border-light: #e2e8f0;
            --border-radius-card: 24px;
            --border-radius-element: 16px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
            --shadow-lg: 0 12px 24px -8px rgba(0,0,0,0.08);
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --success: #10b981;
            --success-light: #d1fae5;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --warning: #f59e0b;
            --warning-light: #fed7aa;
            --accent: #8b5cf6;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #eff3f8 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 24px 20px 40px;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header h1 {
            font-size: clamp(1.6rem, 5vw, 2.2rem);
            font-weight: 700;
            background: linear-gradient(135deg, #1e293b 0%, #3b82f6 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
        }
        .header .sub {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 8px;
            font-weight: 500;
        }

        /* KPI Cards */
        .kpi-grid {
            display: flex;
            gap: 20px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }
        .kpi-card {
            flex: 1;
            min-width: 160px;
            background: var(--bg-surface);
            border-radius: var(--border-radius-card);
            padding: 20px 16px;
            text-align: center;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
            transition: all 0.2s ease;
        }
        .kpi-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .kpi-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .kpi-value {
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            font-weight: 800;
            color: var(--text-primary);
        }
        .kpi-card.entradas .kpi-value { color: var(--success); }
        .kpi-card.salidas .kpi-value { color: var(--danger); }
        .kpi-card.saldo .kpi-value { color: var(--primary); }

        /* Tabs */
        .tabs {
            display: flex;
            background: var(--bg-surface);
            border-radius: 60px;
            padding: 4px;
            margin-bottom: 28px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 16px;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 56px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .tab-pane {
            display: none;
            animation: fadeIn 0.25s ease;
        }
        .tab-pane.active-pane { display: block; }

        /* Form Cards */
        .form-card {
            background: var(--bg-surface);
            border-radius: var(--border-radius-card);
            padding: 28px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-light);
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-primary);
            border: 1.5px solid var(--border-light);
            border-radius: var(--border-radius-element);
            font-size: 0.9rem;
            color: var(--text-primary);
            transition: all 0.2s;
            outline: none;
            font-weight: 500;
        }
        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
            background: white;
        }
        .btn-primary {
            background: var(--primary);
            border: none;
            padding: 14px 20px;
            border-radius: var(--border-radius-element);
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }
        .btn-secondary {
            background: transparent;
            border: 1.5px solid var(--border-light);
            padding: 10px 18px;
            border-radius: var(--border-radius-element);
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background: var(--bg-primary);
            border-color: var(--primary);
            color: var(--primary);
        }
        .danger-btn {
            background: transparent;
            border: 1.5px solid var(--border-light);
            color: var(--danger);
        }
        .danger-btn:hover {
            background: var(--danger-light);
            border-color: var(--danger);
        }

        /* Action Bar */
        .action-bar {
            display: flex;
            gap: 12px;
            margin: 20px 0 16px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        /* Transactions - Responsive */
        .transactions-container {
            margin-top: 8px;
        }
        .month-group {
            margin-bottom: 32px;
            background: var(--bg-surface);
            border-radius: var(--border-radius-card);
            overflow: hidden;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
        }
        .month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: #fafcff;
            border-bottom: 1px solid var(--border-light);
            flex-wrap: wrap;
            gap: 12px;
        }
        .month-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-primary);
        }
        .month-stats {
            font-size: 0.8rem;
            background: var(--bg-primary);
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .btn-excel-sm {
            background: transparent;
            border: 1px solid var(--border-light);
            padding: 6px 14px;
            border-radius: 40px;
            color: var(--primary);
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-excel-sm:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Desktop Table */
        @media (min-width: 901px) {
            .desktop-table {
                width: 100%;
                overflow-x: auto;
            }
            .transactions-table {
                width: 100%;
                border-collapse: collapse;
            }
            .transactions-table th {
                text-align: left;
                padding: 14px 16px;
                background: #f8fafc;
                font-weight: 600;
                font-size: 0.8rem;
                color: var(--text-muted);
                border-bottom: 1px solid var(--border-light);
            }
            .transactions-table td {
                padding: 14px 16px;
                border-bottom: 1px solid var(--border-light);
                font-size: 0.85rem;
            }
            .transactions-table tr:hover td {
                background: #fafcff;
            }
            .mobile-cards { display: none; }
        }

        /* Mobile Cards */
        @media (max-width: 900px) {
            .desktop-table { display: none; }
            .mobile-cards { display: flex; flex-direction: column; gap: 12px; padding: 16px; }
            .transaction-card {
                background: var(--bg-surface);
                border: 1px solid var(--border-light);
                border-radius: 20px;
                padding: 16px;
                transition: all 0.2s;
            }
            .transaction-card:active { transform: scale(0.99); }
            .card-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 10px;
            }
            .card-category {
                background: var(--bg-primary);
                padding: 4px 12px;
                border-radius: 20px;
                font-size: 0.7rem;
                font-weight: 600;
                color: var(--text-secondary);
            }
            .card-amount {
                font-size: 1.3rem;
                font-weight: 700;
            }
            .amount-positive { color: var(--success); }
            .amount-negative { color: var(--danger); }
            .card-desc {
                font-size: 0.85rem;
                color: var(--text-secondary);
                margin: 8px 0 6px;
            }
            .card-date {
                font-size: 0.7rem;
                color: var(--text-muted);
            }
        }

        .badge-entrada {
            display: inline-block;
            background: var(--success-light);
            color: var(--success);
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-salida {
            display: inline-block;
            background: var(--danger-light);
            color: var(--danger);
            padding: 4px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            background: var(--bg-surface);
            border-radius: var(--border-radius-card);
            border: 1px solid var(--border-light);
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid var(--border-light);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>✝️ Solo Cristo Salva</h1>
        <div class="sub">Iglesia Bautista de Sola · Administración financiera con integridad</div>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card entradas"><div class="kpi-label">📥 Ingresos</div><div class="kpi-value" id="total-entradas">$0</div></div>
        <div class="kpi-card salidas"><div class="kpi-label">📤 Egresos</div><div class="kpi-value" id="total-salidas">$0</div></div>
        <div class="kpi-card saldo"><div class="kpi-label">⚖️ Saldo</div><div class="kpi-value" id="saldo-actual">$0</div></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="registro">➕ Nuevo movimiento</button>
        <button class="tab-btn" data-tab="historial">📋 Historial</button>
    </div>

    <div id="registro" class="tab-pane active-pane">
        <div class="form-card">
            <form id="form-transaccion">
                <div class="form-grid">
                    <div class="form-group"><label>Tipo</label><select id="tipo"><option value="entrada">💵 Entrada (Ingreso)</option><option value="salida">💰 Salida (Gasto)</option></select></div>
                    <div class="form-group"><label>Categoría</label><select id="categoria">
                        <optgroup label="📥 Entradas"><option value="diezmo">Diezmo</option><option value="ofrenda">Ofrenda</option><option value="donacion">Donación</option><option value="evento">Evento Especial</option></optgroup>
                        <optgroup label="📤 Salidas - Ministerios">
                            <option value="infantil">Ministerio Infantil</option><option value="tercera-edad">Tercera Edad</option>
                            <option value="jovenes">Jóvenes</option><option value="juveniles">Juveniles</option>
                            <option value="administracion">Administración</option><option value="empleomania">Empleomanía</option>
                            <option value="ayuda-social">Ayuda Social</option><option value="mantenimiento">Mantenimiento</option>
                            <option value="pago-servicios">Pago Servicios</option><option value="misiones">Misiones</option>
                        </optgroup>
                    </select></div>
                    <div class="form-group"><label>Monto</label><input type="number" id="monto" step="0.01" placeholder="0.00" required></div>
                    <div class="form-group"><label>Descripción</label><input type="text" id="descripcion" placeholder="Motivo / detalle" required></div>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 24px;">✨ Registrar transacción</button>
            </form>
            <div class="action-bar" style="justify-content: flex-end; margin-top: 16px;">
                <button id="borrarTodoBtn" class="btn-secondary danger-btn">🗑️ Borrar todos los datos</button>
            </div>
        </div>
    </div>

    <div id="historial" class="tab-pane">
        <div class="form-card" style="padding: 20px;">
            <div class="form-group"><label>🔍 Buscar movimiento</label><input type="text" id="filtro-busqueda" placeholder="Descripción, categoría o tipo..."></div>
            <div class="action-bar">
                <button id="exportarGlobalBtn" class="btn-secondary">📁 Exportar todo (Excel)</button>
                <button id="exportarFiltradoBtn" class="btn-secondary">📎 Exportar vista actual</button>
            </div>
            <div id="transacciones-container" class="transactions-container"></div>
        </div>
    </div>
    <footer>Datos guardados localmente · Informes Excel con formato profesional · Diseño adaptativo</footer>
</div>

<script>
    let transacciones = [];
    const STORAGE_KEY = 'iglesia_solo_cristo_v4_clean';

    function guardarStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify(transacciones)); }

    function cargarStorage() {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) {
            try {
                let parsed = JSON.parse(data);
                if (Array.isArray(parsed)) transacciones = parsed.map(t => ({ ...t, fecha: new Date(t.fecha), monto: Number(t.monto) }));
                else transacciones = [];
            } catch(e) { transacciones = []; }
        }
        // Iniciar EN CERO - sin datos de ejemplo
        if (!transacciones.length) {
            transacciones = [];
            guardarStorage();
        }
        actualizarResumen();
        renderizarHistorial();
    }

    function actualizarResumen() {
        const totalEntradas = transacciones.filter(t => t.tipo === 'entrada').reduce((a,b) => a + b.monto, 0);
        const totalSalidas = transacciones.filter(t => t.tipo === 'salida').reduce((a,b) => a + b.monto, 0);
        document.getElementById('total-entradas').innerHTML = `$${totalEntradas.toFixed(2)}`;
        document.getElementById('total-salidas').innerHTML = `$${totalSalidas.toFixed(2)}`;
        document.getElementById('saldo-actual').innerHTML = `$${(totalEntradas - totalSalidas).toFixed(2)}`;
    }

    function agregarTransaccion(nueva) {
        transacciones.push(nueva);
        guardarStorage();
        actualizarResumen();
        renderizarHistorial();
    }

    function getFiltradas() {
        const texto = document.getElementById('filtro-busqueda')?.value.trim().toLowerCase() || '';
        if (!texto) return transacciones;
        return transacciones.filter(t => 
            t.descripcion.toLowerCase().includes(texto) || 
            t.categoria.toLowerCase().includes(texto) ||
            t.tipo.includes(texto)
        );
    }

    function generarCSV(transaccionesArray, nombreArchivo, titulo) {
        if (!transaccionesArray.length) { alert("No hay datos para exportar"); return; }
        const ordenadas = [...transaccionesArray].sort((a,b) => new Date(a.fecha) - new Date(b.fecha));
        const totalEnt = ordenadas.filter(t => t.tipo === 'entrada').reduce((s,t) => s + t.monto, 0);
        const totalSal = ordenadas.filter(t => t.tipo === 'salida').reduce((s,t) => s + t.monto, 0);
        const saldo = totalEnt - totalSal;
        const rows = ordenadas.map(t => {
            const fecha = t.fecha instanceof Date ? t.fecha.toLocaleDateString('es-ES') : new Date(t.fecha).toLocaleDateString('es-ES');
            const tipoText = t.tipo === 'entrada' ? 'ENTRADA' : 'SALIDA';
            return `"${fecha}";"${tipoText}";"${t.categoria}";${t.monto.toFixed(2)};"${t.descripcion.replace(/"/g, '""')}"`;
        });
        const header = '"FECHA";"TIPO";"CATEGORÍA";"MONTO";"DESCRIPCIÓN"';
        const separator = '"";"";"";"";""';
        const totalRow = `"RESUMEN:";"ENTRADAS: $${totalEnt.toFixed(2)}";"SALIDAS: $${totalSal.toFixed(2)}";"SALDO: $${saldo.toFixed(2)}";""`;
        const footer = `"${titulo}";"Generado: ${new Date().toLocaleString()}";"Iglesia Bautista de Sola - Solo Cristo Salva";"";""`;
        const csv = header + "\n" + separator + "\n" + rows.join("\n") + "\n" + separator + "\n" + totalRow + "\n" + footer;
        const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = nombreArchivo.endsWith('.csv') ? nombreArchivo : `${nombreArchivo}.csv`;
        link.click();
        URL.revokeObjectURL(link.href);
    }

    window.exportarMes = (mesKey) => {
        const filtradas = transacciones;
        const grupos = {};
        filtradas.forEach(t => {
            const fecha = t.fecha instanceof Date ? t.fecha : new Date(t.fecha);
            const key = `${fecha.getFullYear()}-${(fecha.getMonth()+1).toString().padStart(2,'0')}`;
            if (!grupos[key]) grupos[key] = [];
            grupos[key].push(t);
        });
        if (grupos[mesKey]) {
            generarCSV(grupos[mesKey], `Informe_${mesKey}_Iglesia.csv`, `INFORME MENSUAL ${mesKey} - Solo Cristo Salva`);
        } else {
            alert("No se encontraron movimientos para este mes");
        }
    };

    function renderizarHistorial() {
        const container = document.getElementById('transacciones-container');
        if (!container) return;
        let filtradas = getFiltradas();
        if (filtradas.length === 0) {
            container.innerHTML = `<div class="empty-state">📭 No hay movimientos registrados. Ve a "Nuevo movimiento" para comenzar.</div>`;
            return;
        }
        const grupos = {};
        filtradas.forEach(t => {
            const fecha = t.fecha instanceof Date ? t.fecha : new Date(t.fecha);
            const key = `${fecha.getFullYear()}-${(fecha.getMonth()+1).toString().padStart(2,'0')}`;
            const nombreMostrar = fecha.toLocaleDateString('es-ES', { year: 'numeric', month: 'long' });
            if (!grupos[key]) grupos[key] = { nombre: nombreMostrar, items: [], totalEnt: 0, totalSal: 0 };
            grupos[key].items.push(t);
            if (t.tipo === 'entrada') grupos[key].totalEnt += t.monto;
            else grupos[key].totalSal += t.monto;
        });
        const keysOrden = Object.keys(grupos).sort().reverse();
        let html = '';
        for (let key of keysOrden) {
            const grupo = grupos[key];
            const neto = grupo.totalEnt - grupo.totalSal;
            const itemsOrder = [...grupo.items].sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
            
            let desktopRows = '';
            for (let t of itemsOrder) {
                const fechaShort = t.fecha instanceof Date ? t.fecha.toLocaleDateString('es-ES') : new Date(t.fecha).toLocaleDateString('es-ES');
                const badge = t.tipo === 'entrada' ? '<span class="badge-entrada">Entrada</span>' : '<span class="badge-salida">Salida</span>';
                const montoColor = t.tipo === 'entrada' ? 'style="color:#10b981; font-weight:700;"' : 'style="color:#ef4444; font-weight:700;"';
                desktopRows += `<tr><td>${fechaShort}</td><td>${badge}</td><td>${escapeHtml(t.categoria)}</td><td ${montoColor}>$${t.monto.toFixed(2)}</td><td>${escapeHtml(t.descripcion)}</td></tr>`;
            }
            
            let mobileCards = '';
            for (let t of itemsOrder) {
                const fechaShort = t.fecha instanceof Date ? t.fecha.toLocaleDateString('es-ES') : new Date(t.fecha).toLocaleDateString('es-ES');
                const amountClass = t.tipo === 'entrada' ? 'amount-positive' : 'amount-negative';
                const signo = t.tipo === 'entrada' ? '+' : '-';
                mobileCards += `
                    <div class="transaction-card">
                        <div class="card-header">
                            <span class="card-category">${escapeHtml(t.categoria)}</span>
                            <span class="card-amount ${amountClass}">${signo} $${t.monto.toFixed(2)}</span>
                        </div>
                        <div class="card-desc">📝 ${escapeHtml(t.descripcion)}</div>
                        <div class="card-date">📅 ${fechaShort}</div>
                    </div>
                `;
            }
            
            html += `
                <div class="month-group">
                    <div class="month-header">
                        <span class="month-name">📅 ${grupo.nombre}</span>
                        <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                            <span class="month-stats">💰 +$${grupo.totalEnt.toFixed(2)} | -$${grupo.totalSal.toFixed(2)} | ${neto>=0 ? '🟢' : '🔴'} $${neto.toFixed(2)}</span>
                            <button class="btn-excel-sm" onclick="exportarMes('${key}')">📎 Exportar mes (CSV)</button>
                        </div>
                    </div>
                    <div class="desktop-table">
                        <table class="transactions-table">
                            <thead><tr><th>Fecha</th><th>Tipo</th><th>Categoría</th><th>Monto</th><th>Descripción</th></tr></thead>
                            <tbody>${desktopRows}</tbody>
                        </table>
                    </div>
                    <div class="mobile-cards">${mobileCards}</div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

    document.getElementById('form-transaccion')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const tipo = document.getElementById('tipo').value;
        const categoria = document.getElementById('categoria').value;
        const monto = parseFloat(document.getElementById('monto').value);
        const descripcion = document.getElementById('descripcion').value.trim();
        if (isNaN(monto) || monto <= 0) { alert("Ingresa un monto válido mayor a cero"); return; }
        if (!descripcion) { alert("La descripción es obligatoria"); return; }
        const nueva = { id: Date.now() + '-' + Math.random().toString(36), tipo, categoria, monto, descripcion, fecha: new Date() };
        agregarTransaccion(nueva);
        document.getElementById('monto').value = '';
        document.getElementById('descripcion').value = '';
        document.querySelector('.tab-btn[data-tab="historial"]').click();
    });

    const tabs = document.querySelectorAll('.tab-btn');
    tabs.forEach(btn => {
        btn.addEventListener('click', () => {
            const tabId = btn.getAttribute('data-tab');
            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active-pane'));
            document.getElementById(tabId).classList.add('active-pane');
            tabs.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (tabId === 'historial') renderizarHistorial();
        });
    });

    document.getElementById('borrarTodoBtn')?.addEventListener('click', () => {
        if (confirm("⚠️ Esta acción eliminará TODOS los registros financieros. ¿Estás seguro?")) {
            transacciones = [];
            guardarStorage();
            actualizarResumen();
            renderizarHistorial();
        }
    });
    document.getElementById('exportarGlobalBtn')?.addEventListener('click', () => {
        if (transacciones.length === 0) { alert("No hay datos para exportar"); return; }
        generarCSV(transacciones, "Reporte_Global_SoloCristoSalva.csv", "INFORME GLOBAL - Iglesia Bautista de Sola");
    });
    document.getElementById('exportarFiltradoBtn')?.addEventListener('click', () => {
        const filtradas = getFiltradas();
        if (filtradas.length === 0) { alert("No hay datos con el filtro actual"); return; }
        generarCSV(filtradas, "Informe_Filtrado_Iglesia.csv", "INFORME POR FILTRO - Solo Cristo Salva");
    });
    document.getElementById('filtro-busqueda')?.addEventListener('input', () => renderizarHistorial());
    
    cargarStorage();
</script>
</body>
</html>
